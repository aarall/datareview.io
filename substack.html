<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>DataReview — Coming soon</title>

  <meta name="description" content="DataReview — AI, Data, Experiments, Insights. Subscribe on Substack." />

  <style>
    :root {
      --bg: #0b0d12;
      --text: rgba(255,255,255,0.92);
      --muted: rgba(255,255,255,0.7);
      --border: rgba(255,255,255,0.12);
      --accent: #ff6719;
      --radius: 20px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, system-ui, Segoe UI, Roboto, Helvetica, Arial;
      color: var(--text);
      background:
        radial-gradient(800px 500px at 20% 10%, rgba(255,103,25,0.25), transparent 60%),
        radial-gradient(800px 600px at 80% 90%, rgba(120,92,255,0.18), transparent 60%),
        var(--bg);
      display: grid;
      place-items: center;
      min-height: 100vh;
      padding: 24px;
    }

    .card {
      width: min(720px, 100%);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
      padding: 44px 34px;
      text-align: center;
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(34px, 5vw, 56px);
      letter-spacing: -0.02em;
    }

    .subtitle {
      margin: 0 0 26px;
      color: var(--muted);
      font-size: 17px;
    }

    .embed {
      margin-top: 20px;
      border-radius: 14px;
      overflow: hidden;
      background: white;
      border: 1px solid rgba(0,0,0,0.08);
    }

    iframe {
      width: 100%;
      height: 320px;
      border: 0;
      display: block;
    }

    .footer {
      margin-top: 22px;
      font-size: 12px;
      color: rgba(255,255,255,0.55);
    }
  </style>
</head>

<body>

  <main class="card">
    <h1>DataReview</h1>
    <p class="subtitle">AI • Data • Experiments • Insights</p>

    <div class="embed">
      <iframe
        src="https://datareview.substack.com/embed"
        frameborder="0"
        scrolling="no">
      </iframe>
    </div>

    <div class="footer">
      © <span id="year"></span> DataReview
    </div>
  </main>

  <script>
    document.getElementById("year").textContent = new Date().getFullYear();
  </script>

</body>
</html>
